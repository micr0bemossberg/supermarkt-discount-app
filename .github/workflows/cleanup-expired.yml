name: Cleanup Expired Products

on:
  schedule:
    # Run every Monday at 02:00 UTC (before scrapers run)
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run cleanup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npm run scrape -- cleanup
        working-directory: packages/scraper

      - name: Notify on failure
        if: failure()
        run: echo "Cleanup failed! Check the logs."
