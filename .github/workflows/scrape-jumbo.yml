name: Scrape Jumbo

on:
  schedule:
    # Run at 04:15 UTC (stagger by 15 mins from AH)
    - cron: '15 4 * * *'
    # Run at 16:15 UTC
    - cron: '15 16 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: packages/scraper

      - name: Run Jumbo scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HEADLESS: true
          SCREENSHOT_ON_ERROR: true
        run: npm run scrape -- --supermarket=jumbo
        working-directory: packages/scraper

      - name: Upload error screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots-jumbo-${{ github.run_number }}
          path: packages/scraper/screenshots/
          retention-days: 7
