name: Scrape Albert Heijn

on:
  schedule:
    # Run at 04:00 UTC (06:00 CET winter, 06:00 CEST summer)
    - cron: '0 4 * * *'
    # Run at 16:00 UTC (18:00 CET winter, 18:00 CEST summer)
    - cron: '0 16 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: packages/scraper

      - name: Run Albert Heijn scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HEADLESS: true
          SCREENSHOT_ON_ERROR: true
        run: npm run scrape -- --supermarket=ah
        working-directory: packages/scraper

      - name: Upload error screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots-ah-${{ github.run_number }}
          path: packages/scraper/screenshots/
          retention-days: 7
          if-no-files-found: ignore
